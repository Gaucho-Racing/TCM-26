name: tcm26

services:
  mqtt:
    build:
      context: .
      dockerfile: mqtt/Dockerfile.dev
    container_name: mqtt
    restart: unless-stopped
    depends_on:
      - db
      - nanomq
    ports:
      - "8000:8000/udp"
    extra_hosts:
      # Lets the container reach a broker running on the docker host (e.g. the
      # Mapache stack's NanoMQ on port 1883). Linux needs this explicitly;
      # Docker Desktop on macOS/Windows resolves host.docker.internal natively.
      - "host.docker.internal:host-gateway"
    volumes:
      - ./mqtt:/app/mqtt
      - mqtt_go_cache:/go
    environment:
      ENV: "DEV"
      VEHICLE_ID: ${VEHICLE_ID:-GR26}
      VEHICLE_UPLOAD_KEY: ${VEHICLE_UPLOAD_KEY:-0}
      DATABASE_HOST: ${DATABASE_HOST:-db}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-tcm26}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-password}
      LOCAL_MQTT_HOST: ${LOCAL_MQTT_HOST:-nanomq}
      LOCAL_MQTT_PORT: ${LOCAL_MQTT_PORT:-1883}
      LOCAL_MQTT_USER: ${LOCAL_MQTT_USER:-}
      LOCAL_MQTT_PASSWORD: ${LOCAL_MQTT_PASSWORD:-}
      CLOUD_MQTT_HOST: ${CLOUD_MQTT_HOST:-}
      CLOUD_MQTT_PORT: ${CLOUD_MQTT_PORT:-1883}
      CLOUD_MQTT_USER: ${CLOUD_MQTT_USER:-}
      CLOUD_MQTT_PASSWORD: ${CLOUD_MQTT_PASSWORD:-}
      CAN_PORT: "8000"
      PUBLISH_INTERVAL: "100"
      PING_INTERVAL: "5000"

  # On-vehicle gr26 ingest. Subscribes to the local NanoMQ, decodes signals,
  # and serves them via WebSocket on :7005 for the Electron dash. Skips DB
  # writes (ENABLE_SIGNAL_DB=false) — historical storage happens in the cloud
  # gr26 ingest. Image is published from the Mapache repo via GH Actions.
  gr26:
    image: ghcr.io/gaucho-racing/mapache/gr26:latest
    container_name: gr26
    restart: unless-stopped
    depends_on:
      - db
      - nanomq
    ports:
      # Different port from Mapache's gr26 (7005) so both stacks can run on
      # the same host without colliding.
      - "8001:8001"
    environment:
      ENV: "DEV"
      PORT: "8001"
      SKIP_AUTH_CHECK: "true"
      ENABLE_SIGNAL_DB: "false"
      ENABLE_SIGNAL_WS: "true"
      MQTT_HOST: ${LOCAL_MQTT_HOST:-nanomq}
      MQTT_PORT: ${LOCAL_MQTT_PORT:-1883}
      MQTT_USER: ${LOCAL_MQTT_USER:-}
      MQTT_PASSWORD: ${LOCAL_MQTT_PASSWORD:-}
      DATABASE_HOST: ${DATABASE_HOST:-db}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: gr26
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-password}

  nanomq:
    image: emqx/nanomq:latest
    container_name: nanomq
    restart: unless-stopped
    ports:
      # Use a non-default host port so the Mapache stack (also exposes 1883)
      # can run alongside this stack without collision. Containers inside
      # this stack still reach NanoMQ as `nanomq:1883`.
      - "1884:1883"

  db:
    image: postgres:18-alpine
    container_name: db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-password}
      POSTGRES_DB: ${DATABASE_NAME:-tcm26}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Init script runs once on first volume creation; creates a separate
      # `gr26` database alongside the default `tcm26` so the two services
      # don't fight over the `ping` table schema.
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro

volumes:
  pgdata:
  mqtt_go_cache:
