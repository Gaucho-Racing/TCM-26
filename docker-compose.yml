name: tcm26-dev

# All services run on host networking. Simpler than maintaining port maps
# and a custom bridge — every service talks to peers via localhost on the
# default ports. The tradeoff is that running this alongside another stack
# that also wants 1883/5432/8000/8001 will collide; that's intentional, the
# Jetson is a dedicated host.
#
# This file is the dev compose only: TCM-26's own services (mqtt,
# icanspi, shelter) build from local source under air for hot reload.
# Cross-repo Mapache services (gr26, live) pull pinned images from
# GHCR — bind-mounting their source would require a sibling Mapache
# checkout that not every dev has. No restart policy so crashes are
# visible in `docker compose logs`. Env values are inlined (no .env
# file) — change them here when iterating. Use it on a laptop or a
# dev Jetson while iterating.
#
# The on-vehicle production stack is a SEPARATE compose in the
# `jetson-infra` repo — it pulls pinned GHCR images, drops the air
# tooling, sets `restart: always`. It's not an overlay on this file.

services:
    mqtt:
        build:
            context: .
            dockerfile: mqtt/Dockerfile.dev
        network_mode: host
        extra_hosts:
            - "host.docker.internal:host-gateway"
        volumes:
            - ./mqtt:/app/mqtt
            - mqtt_go_cache:/go
            # jtop reads metrics over a unix socket exposed by the host's
            # jetson-stats service. Install on the Jetson with:
            #   sudo -H pip install -U jetson-stats
            #   sudo systemctl enable --now jtop.service
            - /var/run/jtop.sock:/var/run/jtop.sock
        environment:
            ENV: "DEV"
            VEHICLE_ID: ${VEHICLE_ID}
            VEHICLE_UPLOAD_KEY: ${VEHICLE_UPLOAD_KEY}
            DATABASE_HOST: localhost
            DATABASE_PORT: "5432"
            DATABASE_NAME: tcm26
            DATABASE_USER: postgres
            DATABASE_PASSWORD: password
            LOCAL_MQTT_HOST: localhost
            LOCAL_MQTT_PORT: "1883"
            CLOUD_MQTT_HOST: ${CLOUD_MQTT_HOST}
            CLOUD_MQTT_PORT: ${CLOUD_MQTT_PORT}
            CLOUD_MQTT_USER: ${CLOUD_MQTT_USER}
            CLOUD_MQTT_PASSWORD: ${CLOUD_MQTT_PASSWORD}
            CAN_PORT: "8000"
            VIRTUAL_CAN_PORTS: "8100"
            LOCAL_PUBLISH_INTERVAL: "20"
            CLOUD_PUBLISH_INTERVAL: "100"
            PING_INTERVAL: "5000"

    icanspi:
        build:
            context: ./icanspi
        network_mode: host
        # libjetgpio mmaps /dev/mem and pokes the Jetson's GPIO/SPI registers
        # directly, so it needs full hardware access. On non-Jetson hosts the
        # container starts, fails gpioInitialise, and exits — and stays
        # exited under this dev compose. The prod stack in jetson-infra
        # sets `restart: always` so it'll keep retrying on the Jetson itself.
        privileged: true
        volumes:
            # libjetgpio runs `modprobe spidev` at init. modprobe (in the image
            # via kmod) needs the host's kernel modules to actually load
            # anything; mount /lib/modules read-only so it can find them.
            - /lib/modules:/lib/modules:ro

    gr26:
        image: ghcr.io/gaucho-racing/mapache/gr26:latest
        network_mode: host
        depends_on:
            - nanomq
        environment:
            ENV: "DEV"
            PORT: "8001"
            # Local-only deployment — no Rincon registry, no auth checking,
            # CLICKHOUSE_HOST intentionally unset so gr26 skips CH entirely.
            # The on-car dash gets its live signals from the local `live`
            # service (which subscribes to gr26's query/live/* topics).
            SKIP_AUTH_CHECK: "true"
            MQTT_HOST: localhost
            MQTT_PORT: "1883"

    live:
        image: ghcr.io/gaucho-racing/mapache/live:latest
        network_mode: host
        depends_on:
            - nanomq
        environment:
            ENV: "DEV"
            PORT: "7015"
            MQTT_HOST: localhost
            MQTT_PORT: "1883"
            CACHE_WINDOW_SEC: "60"

    shelter:
        build:
            context: ./shelter
            dockerfile: Dockerfile.dev
        network_mode: host
        volumes:
            - ./shelter:/app
        environment:
            ENV: "DEV"
            VEHICLE_ID: ${VEHICLE_ID}
            DATABASE_HOST: localhost
            DATABASE_PORT: "5432"
            DATABASE_NAME: tcm26
            DATABASE_USER: postgres
            DATABASE_PASSWORD: password
            S3_URI: s3://gaucho-racing/epic-shelter/tcm-26/
            S3_REGION: us-west-2
            AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
            AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
            BATCH_SIZE: "1000000"
            MAX_BATCH_AGE: "600"
            IDLE_SLEEP: "10"
            ERROR_BACKOFF: "30"
            VIRTUAL_CAN_PORT: "8100"
            HEARTBEAT_INTERVAL: "5"

    nanomq:
        image: emqx/nanomq:latest
        network_mode: host

    db:
        image: postgres:18-alpine
        network_mode: host
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: password
            POSTGRES_DB: tcm26
        volumes:
            # pg18+ writes to /var/lib/postgresql/<major>/docker; mount the parent.
            - pgdata:/var/lib/postgresql
            # Creates a separate gr26 database alongside tcm26 to isolate the
            # gr26 ingest's Ping schema from the relay's.
            - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro

volumes:
    pgdata:
    mqtt_go_cache:
