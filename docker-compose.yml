name: tcm26

services:
  mqtt:
    build:
      context: .
      dockerfile: mqtt/Dockerfile.dev
    restart: unless-stopped
    depends_on:
      - db
      - nanomq
    ports:
      - "8000:8000/udp"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./mqtt:/app/mqtt
      - mqtt_go_cache:/go
    environment:
      ENV: "DEV"
      VEHICLE_ID: ${VEHICLE_ID:-GR26}
      VEHICLE_UPLOAD_KEY: ${VEHICLE_UPLOAD_KEY:-0}
      DATABASE_HOST: ${DATABASE_HOST:-db}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-tcm26}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-password}
      LOCAL_MQTT_HOST: ${LOCAL_MQTT_HOST:-nanomq}
      LOCAL_MQTT_PORT: ${LOCAL_MQTT_PORT:-1883}
      LOCAL_MQTT_USER: ${LOCAL_MQTT_USER:-}
      LOCAL_MQTT_PASSWORD: ${LOCAL_MQTT_PASSWORD:-}
      CLOUD_MQTT_HOST: ${CLOUD_MQTT_HOST:-}
      CLOUD_MQTT_PORT: ${CLOUD_MQTT_PORT:-1883}
      CLOUD_MQTT_USER: ${CLOUD_MQTT_USER:-}
      CLOUD_MQTT_PASSWORD: ${CLOUD_MQTT_PASSWORD:-}
      CAN_PORT: "8000"
      PUBLISH_INTERVAL: "100"
      PING_INTERVAL: "5000"

  gr26:
    image: ghcr.io/gaucho-racing/mapache/gr26:latest
    restart: unless-stopped
    depends_on:
      - db
      - nanomq
    ports:
      - "8001:8001"
    environment:
      ENV: "DEV"
      PORT: "8001"
      SKIP_AUTH_CHECK: "true"
      ENABLE_SIGNAL_DB: "false"
      ENABLE_SIGNAL_WS: "true"
      MQTT_HOST: ${LOCAL_MQTT_HOST:-nanomq}
      MQTT_PORT: ${LOCAL_MQTT_PORT:-1883}
      MQTT_USER: ${LOCAL_MQTT_USER:-}
      MQTT_PASSWORD: ${LOCAL_MQTT_PASSWORD:-}
      DATABASE_HOST: ${DATABASE_HOST:-db}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: gr26
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-password}

  nanomq:
    image: emqx/nanomq:latest
    restart: unless-stopped
    ports:
      - "1884:1883"

  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-password}
      POSTGRES_DB: ${DATABASE_NAME:-tcm26}
    ports:
      - "5433:5432"
    volumes:
      # Mount the parent dir, not /var/lib/postgresql/data — pg18+ writes to
      # a version-specific subdir (e.g. /var/lib/postgresql/18/docker).
      - pgdata:/var/lib/postgresql
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro

volumes:
  pgdata:
  mqtt_go_cache:
