appId: com.gauchoracing.gr26.dash
productName: GR26 Dash
copyright: Copyright (c) 2026 Gaucho Racing

directories:
  output: dist
  buildResources: build

files:
  - 'out/**/*'
  - 'package.json'
  - '!node_modules/**/{CHANGELOG.md,README.md,readme.md,LICENSE.txt}'

asar: true

linux:
  target:
    - target: deb
      arch:
        - arm64
        - x64
    - target: AppImage
      arch:
        - arm64
        - x64
  category: Utility
  vendor: Gaucho Racing
  maintainer: Gaucho Racing <team@gauchoracing.com>
  synopsis: GR26 driver dashboard
  description: On-vehicle Electron driver display for the GR26 race car.
  desktop:
    Name: GR26 Dash
    Comment: On-vehicle driver display
    Categories: Utility
    StartupNotify: false

deb:
  packageCategory: utils
  priority: optional

mac:
  category: public.app-category.utilities
  # Universal binary covers both Apple Silicon and Intel Macs in one
  # artifact — simpler distribution for the (small, mixed) team.
  target:
    - target: dmg
      arch: universal
    - target: zip
      arch: universal
  # No code signing — internal team distribution. Users will get the
  # standard "unidentified developer" warning the first time, then it's
  # fine. Sign + notarize later if we ever ship outside the team.
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false

win:
  target:
    - target: nsis
      arch: x64
    - target: zip
      arch: x64
  publisherName: Gaucho Racing

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  shortcutName: GR26 Dash
  createDesktopShortcut: true
  createStartMenuShortcut: true
  menuCategory: Gaucho Racing
