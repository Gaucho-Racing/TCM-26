name: icanspi
run-name: Triggered by ${{ github.event_name }} to ${{ github.ref }} by @${{ github.actor }}

on:
  push:
    branches:
      - "**"
    tags:
      - "**"

# icanspi depends on libjetgpio (Jetson-only), so we build for arm64 only.
# No need for the manifest-merge dance the multi-arch services use — single
# platform means we tag the build directly.
jobs:
  build:
    runs-on: ubuntu-24.04-arm
    name: Build linux/arm64
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if this commit has a release tag
        id: release
        run: |
          tag=$(git tag --points-at HEAD | grep '^v' | head -n1)
          if [ -n "$tag" ]; then
            echo "Found tag: $tag"
            if gh release view "$tag" --json tagName > /dev/null 2>&1; then
              echo "release_tag=$tag" >> $GITHUB_OUTPUT
              echo "is_release=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          echo "is_release=false" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tag list
        id: tags
        shell: bash
        run: |
          TAGS="type=sha"

          if [ "${GITHUB_REF_TYPE}" = "branch" ] && [ "${GITHUB_REF_NAME}" = "main" ]; then
            TAGS="${TAGS}\ntype=raw,value=latest"
          fi

          if [ "${{ steps.release.outputs.is_release }}" = "true" ]; then
            CLEAN_TAG=$(echo "${{ steps.release.outputs.release_tag }}" | sed 's/^v//')
            TAGS="${TAGS}\ntype=raw,value=${CLEAN_TAG}"
          fi

          echo -e "tags<<EOF\n$TAGS\nEOF" >> $GITHUB_OUTPUT

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/gaucho-racing/tcm-26/icanspi
          tags: ${{ steps.tags.outputs.tags }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: icanspi
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=icanspi-arm64
          cache-to: type=gha,scope=icanspi-arm64,mode=max

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ghcr.io/gaucho-racing/tcm-26/icanspi:${{ steps.meta.outputs.version }}
