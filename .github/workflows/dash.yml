name: dash
run-name: Triggered by ${{ github.event_name }} to ${{ github.ref }} by @${{ github.actor }}

on:
  push:
    branches:
      - "**"
    tags:
      - "**"

jobs:
  check:
    runs-on: ubuntu-latest
    name: Lint + typecheck + build
    defaults:
      run:
        working-directory: dash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dash/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  # Builds the dash for linux/arm64 (Jetson) on a v* tag push and attaches
  # the .deb + AppImage to the GitHub Release. Mac/Windows builds aren't
  # produced — for desktop iteration just run `npm run dev`.
  release:
    needs: check
    if: startsWith(github.ref, 'refs/tags/v')
    name: Release linux/arm64
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    defaults:
      run:
        working-directory: dash
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dash/package-lock.json

      - name: Install dependencies
        run: npm ci

      # electron-builder bundles an x86-only fpm for building .deb packages,
      # which obviously doesn't run on arm64. Install fpm via gem so
      # USE_SYSTEM_FPM picks up an arm64-native one.
      - name: Install fpm
        run: sudo gem install --no-document fpm

      - name: Build linux/arm64
        run: npm run build:linux
        env:
          USE_SYSTEM_FPM: "true"

      - name: Attach artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dash/dist/*.deb
            dash/dist/*.AppImage
          fail_on_unmatched_files: true
          generate_release_notes: true
