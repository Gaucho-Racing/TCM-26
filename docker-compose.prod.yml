# Production overlay for the on-vehicle Jetson install. Layered on top
# of docker-compose.yml — adds `restart: always` to every service so
# the stack self-heals after a crash and comes up automatically on
# boot once the Docker daemon is running.
#
# Bring up the full stack on the Jetson with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Stop with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml down
#
# `restart: always` (vs `unless-stopped`) means the container starts
# even after a `docker stop` if Docker itself is restarted — desired
# behavior on a kiosk Jetson where we never want manual stops to
# persist past a reboot.

services:
  mqtt:
    restart: always
  icanspi:
    restart: always
  gr26:
    restart: always
  nanomq:
    restart: always
  db:
    restart: always
